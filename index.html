<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- MUSIC -->

<audio id="song" loop>
<source src="bestie.mp3" type="audio/mp3">
</audio>

<!-- WELCOME -->

<section id="welcome" class="page active">

<h1>🎉 HAPPY BIRTHDAY Bestie🎉</h1>

<p>I have something special for you ❤️</p>

<button onclick="startWebsite()">
Click Here ❤️
</button>

</section>

<!-- CAKE -->

<section id="cake" class="page">

<h2>Make A Wish ✨</h2>

<h4>18 July 2005 </h4>

<div class="cake">

<div class="candle">

<div class="flame" id="flame"></div>

</div>

<div class="icing"></div>

<div class="layer layer1"></div>

<div class="layer layer2"></div>

</div>

<button onclick="blowCandle()">

💨 Blow Candle

</button>

</section>

<!-- WISH -->

<section id="wish" class="page">

<h1>🌠</h1>

<h2>Close your eyes...</h2>

<p>Make your biggest wish ❤️</p>

<button onclick="openLetter()">

Done ❤️

</button>

</section>

<!-- LETTER -->

<section id="letter" class="page">

<div class="envelope">

💌

</div>

<img src="akku.jpeg" class="photo">

<h2>Happy Birthday Akku ❤️</h2>

<p id="typing"></p>

<button onclick="showFinal()">

Continue ❤️

</button>

</section>

<!-- FINAL -->

<section id="final" class="page">

<h1>🎉Have The Best Day Ever 🎉</h1>

<h2>I hope you like this small gift from me 💖 </h2>

<h4> Your bestie, Shreya </h4>

<div class="emoji">

🎂🎈🎊❤️✨

</div>

</section>

<script src="script.js"></script>

</body>
</html>
